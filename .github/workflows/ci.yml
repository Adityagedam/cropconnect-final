name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cropconnect-backend
    env:
      CROP_DATA_SECRET_KEY: test-data-secret-for-ci
      CROP_AUTH_TOKEN_SECRET: test-auth-secret-for-ci
      PUBLIC_RATE_LIMIT_DB_FAIL_OPEN: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.8.4
      - name: Lint backend
        run: ruff check .
      - name: Test backend
        run: python -m unittest discover -s tests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cropconnect-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cropconnect-frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Test frontend
        run: npm run test
      - name: Check protected routes
        run: npm run check
      - name: Build frontend
        run: npm run build
